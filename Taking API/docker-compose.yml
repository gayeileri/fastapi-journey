version: '3.8'

services:
  web:
    build: .
    container_name: fastapi_notes_app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/notes_db
      - REDIS_URL=redis://redis:6379/0
      # Use the local environment variable for OpenAI API key
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SECRET_KEY=your-super-secret-key-for-jwt
    depends_on:
      db:
        condition: service_started
      redis:
        condition: service_started
    volumes:
      # Sync current directory for live reload (optional for dev)
      - .:/app
    # Run uvicorn with reload for development mode
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  db:
    image: postgres:15-alpine
    container_name: notes_postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=notes_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: notes_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
