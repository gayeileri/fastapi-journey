# ============================================================
# GitHub Actions CI/CD Workflow — DevOps Lab 1
# ============================================================
# This workflow automatically builds and pushes our Docker image
# to GitHub Container Registry (ghcr.io) every time code is pushed.
#
# Key concepts:
#   - GitHub Actions: GitHub's built-in CI/CD (automation) system
#   - GITHUB_TOKEN: Auto-generated secret, no manual setup needed
#   - ghcr.io: GitHub's own Docker image registry (free with your account)
# ============================================================

name: Build and Push Docker Image   # Name shown in the GitHub "Actions" tab

# ------------------------------------
# TRIGGER: When does this workflow run?
# ------------------------------------
on:
  push:                              # Run on every git push...
    branches:
      - main                         # ...on the main branch
      - devOps                       # ...and the devOps branch

# ------------------------------------
# PERMISSIONS: Allow pushing images
# ------------------------------------
permissions:
  contents: read                     # Read repo code
  packages: write                    # Push Docker images to GHCR

# ------------------------------------
# JOBS: The actual automation steps
# ------------------------------------
jobs:
  build-and-push:                    # Job name (can be anything descriptive)
    name: Build & Push to GHCR
    runs-on: ubuntu-latest           # Use a fresh Ubuntu virtual machine

    steps:
      # ── Step 1: Download our code onto the runner machine ────────────────
      - name: Checkout repository
        uses: actions/checkout@v4    # Official GitHub Action to clone the repo

      # ── Step 2: Log in to GitHub Container Registry ──────────────────────
      # GITHUB_TOKEN is automatically provided by GitHub Actions.
      # No need to create any secrets manually!
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}              # Your GitHub username (auto)
          password: ${{ secrets.GITHUB_TOKEN }}       # Auto-generated, never hardcoded

      # ── Step 3: Set up Docker Buildx (advanced builder) ──────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Step 4: Build the Docker image and push to GHCR ─────────────────
      # Image URL: ghcr.io/<your-github-username>/openai-api-lab1:latest
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./devOps_Lab1              # Build from the project folder
          push: true                          # Actually push (not just build)
          tags: ghcr.io/${{ github.repository_owner }}/openai-api-lab1:latest
          cache-from: type=gha               # Use GitHub Actions cache for layers
          cache-to: type=gha,mode=max        # Save layers back to cache
