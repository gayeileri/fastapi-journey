# ============================================================
# GitHub Actions CI/CD Workflow — DevOps Lab 1
# ============================================================
# This workflow automatically builds and pushes our Docker image
# to DockerHub every time code is pushed to the repository.
#
# Key concepts used here:
#   - GitHub Actions: GitHub's built-in CI/CD (automation) system
#   - Secrets: Encrypted variables stored in GitHub, never visible in logs
#   - Docker Buildx: Extended Docker build toolkit (supports caching, etc.)
# ============================================================

name: Build and Push Docker Image   # Name shown in the GitHub "Actions" tab

# ------------------------------------
# TRIGGER: When does this workflow run?
# ------------------------------------
on:
  push:                              # Run on every git push...
    branches:
      - main                         # ...but only on the main branch

# ------------------------------------
# JOBS: The actual automation steps
# ------------------------------------
jobs:
  build-and-push:                    # Job name (can be anything descriptive)
    name: Build & Push to DockerHub
    runs-on: ubuntu-latest           # Use a fresh Ubuntu virtual machine

    steps:
      # ── Step 1: Download our code onto the runner machine ────────────────
      - name: Checkout repository
        uses: actions/checkout@v4    # Official GitHub Action to clone the repo

      # ── Step 2: Log in to DockerHub ──────────────────────────────────────
      # We use GitHub Secrets here — credentials are NEVER written in plain text.
      # Go to: GitHub repo → Settings → Secrets and variables → Actions
      # Add:   DOCKERHUB_USERNAME  and  DOCKERHUB_TOKEN
      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}   # ← from GitHub Secrets
          password: ${{ secrets.DOCKERHUB_TOKEN }}      # ← from GitHub Secrets

      # ── Step 3: Set up Docker Buildx (advanced builder) ──────────────────
      # Buildx enables caching and multi-platform builds.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Step 4: Build the Docker image and push to DockerHub ─────────────
      # The image tag follows the pattern:  <username>/<repo-name>:latest
      # Replace "openai-api-lab1" below with whatever name you want on DockerHub.
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .                          # Build from the repo root
          push: true                          # Actually push (not just build)
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/openai-api-lab1:latest
          cache-from: type=gha               # Use GitHub Actions cache for layers
          cache-to: type=gha,mode=max        # Save layers back to cache
